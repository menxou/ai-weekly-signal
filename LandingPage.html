<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Weekly Signal — Monthly View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0e0e0e;
      --paper: #f7f4ee;
      --accent: #c0392b;
      --muted: #7a7060;
      --rule: #d4cfc5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Masthead ── */
    .masthead {
      text-align: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--rule);
    }
    .masthead-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 0.9rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.5rem;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 5.5rem);
      font-weight: 900; line-height: 0.95;
      letter-spacing: -0.02em; color: var(--ink);
    }
    .masthead-title span { color: var(--accent); }
    .masthead-desc {
      margin: 1.4rem 0 0; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; color: var(--ink); font-weight: 300;
    }
    .masthead-desc strong { font-weight: 700; }

    /* ── Month toolbar ── */
    .month-toolbar {
      display: flex; align-items: center;
      width: 90%; margin: 1.5rem auto 0; padding-bottom: 1.5rem; padding-right: 4.5rem;
    }
    .month-nav { display: flex; align-items: center; gap: 0.9rem; }
    .month-nav-btn {
      background: none; border: 1px solid var(--rule); border-radius: 4px;
      width: 2.8rem; height: 2.8rem; cursor: pointer; font-size: 1.2rem;
      color: var(--ink); display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .month-nav-btn:hover { border-color: var(--ink); }
    .month-label {
      font-family: 'Playfair Display', serif; font-size: 2rem;
      font-weight: 700; letter-spacing: -0.01em;
    }
    .month-today-btn {
      background: none; border: 1px solid var(--rule); border-radius: 4px;
      padding: 0.45rem 1.1rem; font-family: 'DM Mono', monospace;
      font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .month-today-btn:hover { border-color: var(--accent); background: rgba(192,57,43,0.05); }
    .view-cal-btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent); border-radius: 4px;
      padding: 0.45rem 1.2rem; text-decoration: none;
      transition: background 0.15s;
    }
    .month-toolbar .view-cal-btn {
      flex: 1; margin-left: 1.25rem;
    }
    .view-cal-btn:hover { background: rgba(192,57,43,0.06); }

    /* ── Content layout ── */
    .content {
      width: 90%;
      margin: 2rem auto 0;
      display: flex;
      gap: 0;
    }
    .left-gutter { width: 160px; flex-shrink: 0; position: relative; }

    /* ── Filter panel ── */
    .filter-panel { width: 155px; position: sticky; top: 1rem; }
    .filter-toggle {
      width: 100%; background: none; border: 1px solid var(--rule); border-radius: 4px;
      padding: 0.5rem 0.8rem; font-family: 'DM Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: border-color 0.15s;
    }
    .filter-toggle:hover { border-color: var(--ink); }
    .filter-dropdown {
      display: none; flex-direction: column;
      border: 1px solid var(--rule); border-top: none;
      border-radius: 0 0 4px 4px; background: var(--paper);
    }
    .filter-dropdown.open { display: flex; }
    .filter-item {
      background: none; border: none; border-bottom: 1px solid var(--rule);
      padding: 0.55rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      color: var(--muted); cursor: pointer; text-align: left; line-height: 1.3;
      transition: color 0.12s, transform 0.12s;
    }
    .filter-item:last-child { border-bottom: none; }
    .filter-item:hover { font-weight: 700; color: var(--ink); transform: translateX(3px); }
    .filter-item.active { font-weight: 700; color: var(--accent); }
    .filter-clear {
      background: none; border: none; border-top: 1px solid var(--rule);
      padding: 0.45rem 0.8rem; font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      cursor: pointer; text-align: center; width: 100%; transition: color 0.12s;
    }
    .filter-clear:hover { color: var(--ink); }

    /* ── Card filter states ── */
    .card-dim { opacity: 0.12; pointer-events: none; }
    .card-active { font-weight: 700; }
    .weeks-container { flex: 1; min-width: 0; }

    /* ── Week section ── */
    .week-section {
      display: flex;
      align-items: stretch;
      margin-bottom: 3.5rem;
    }
    .week-section:last-child { margin-bottom: 1.5rem; }
    .week-content { flex: 1; min-width: 0; }

    /* ── Week bracket ── */
    .week-bracket {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      margin-left: 1.5rem;
    }
    .bracket-shape {
      width: 0.9rem;
      border-right: 1.5px solid var(--ink);
      border-top: 1.5px solid var(--ink);
      border-bottom: 1.5px solid var(--ink);
    }
    .week-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      writing-mode: vertical-lr;
      padding: 0.6rem 0.45rem;
      margin-left: 0.55rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 4px;
      transition: background 0.15s;
    }
    .week-label:hover { background: rgba(192,57,43,0.06); }

    /* ── Row of 3 ── */
    .row-three {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    /* ── Row of 2 ── */
    .row-two {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }

    /* ── Card (3-col) ── */
    .article-card {
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .article-card:hover { border-color: var(--ink); }

    /* ── Wide card (2-col with image) ── */
    .article-card-wide {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .article-card-wide:hover { border-color: var(--ink); }

    .card-img {
      flex-shrink: 0;
      width: 40%;
      min-height: 140px;
      background: #e8e3d8;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-img::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-45deg, transparent, transparent 6px, rgba(255,255,255,0.15) 6px, rgba(255,255,255,0.15) 7px);
    }
    .card-img span { position: relative; color: rgba(122,112,96,0.35); font-size: 1.1rem; }

    .card-body { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Card inner ── */
    .card-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .card-headline {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink);
      margin-bottom: 0.45rem;
    }
    .card-desc {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--muted);
      font-weight: 300;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      text-align: center;
      padding: 2.5rem 0 3rem;
    }

    /* ── Empty / loading ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--rule);
      text-transform: uppercase;
      border-top: 1px solid var(--rule);
    }
  </style>
</head>
<body>

<!-- ── Masthead ── -->
<header class="masthead">
  <div class="masthead-eyebrow">Curated Intelligence</div>
  <div class="masthead-title">AI Weekly <span>Signal</span></div>
  <div class="masthead-desc">Welcome to your <strong>weekly news page on AI</strong> in the 5 largest industries</div>
</header>

<!-- ── Month toolbar ── -->
<div class="month-toolbar">
  <div class="month-nav">
    <button class="month-nav-btn" id="prev-btn">&#8249;</button>
    <button class="month-nav-btn" id="next-btn">&#8250;</button>
    <span class="month-label" id="month-label"></span>
    <button class="month-today-btn" id="today-btn">Today</button>
  </div>
  <a class="view-cal-btn" id="top-cal-btn" href="CalendarPage.html">View month as calendar</a>
</div>

<!-- ── Weeks ── -->
<main class="content">
  <div class="left-gutter">
    <div class="filter-panel" id="filter-panel">
      <button class="filter-toggle" id="filter-toggle">Sectors <span id="filter-arrow">▾</span></button>
      <div class="filter-dropdown" id="filter-dropdown"></div>
    </div>
  </div>
  <div class="weeks-container" id="weeks-container">
    <div class="empty-state" id="loading">Loading…</div>
  </div>
</main>

<!-- ── Bottom bar ── -->
<div class="bottom-bar">
  <a class="view-cal-btn" id="bottom-cal-btn" href="CalendarPage.html">View month as calendar</a>
</div>

<footer>AI Weekly Signal &nbsp;◆&nbsp; Created by Matteo Di Rito with Claude on AI</footer>

<script>
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  const todayDate = new Date();
  const params    = new URLSearchParams(location.search);
  const monthParam = params.get('month') || '';
  const [yearStr, monthStr] = monthParam.split('-');
  let viewYear  = parseInt(yearStr)  || todayDate.getFullYear();
  let viewMonth = (parseInt(monthStr) || todayDate.getMonth() + 1) - 1; // 0-based

  function updateView() {
    const monthName = MONTH_NAMES[viewMonth];
    document.getElementById('month-label').textContent = `${monthName} ${viewYear}`;
    document.title = `AI Weekly Signal — ${monthName} ${viewYear}`;
    const mm = String(viewMonth + 1).padStart(2, '0');
    const calUrl = `CalendarPage.html?month=${viewYear}-${mm}`;
    document.getElementById('top-cal-btn').href = calUrl;
    document.getElementById('bottom-cal-btn').href = calUrl;
    loadAndRender();
  }

  document.getElementById('prev-btn').addEventListener('click', () => {
    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    updateView();
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    updateView();
  });
  document.getElementById('today-btn').addEventListener('click', () => {
    viewYear = todayDate.getFullYear(); viewMonth = todayDate.getMonth();
    updateView();
  });

  function getWeekNumber(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const day = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - day);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  }

  function articleUrl(edDate, idx, type) {
    return `ReaderPage.html?date=${edDate}&idx=${idx}${type === 'monthly' ? '&type=monthly' : ''}`;
  }

  function makeCard(story, edDate, idx, type) {
    const card = document.createElement('a');
    card.className = 'article-card';
    card.href = articleUrl(edDate, idx, type);
    card.dataset.tag = story.tag || '';
    const tag  = document.createElement('div');  tag.className  = 'card-tag';      tag.textContent = story.tag || '';
    const head = document.createElement('div');  head.className = 'card-headline'; head.textContent = story.headline || '';
    const desc = document.createElement('p');    desc.className = 'card-desc';     desc.textContent = story.desc || '';
    card.append(tag, head, desc);
    return card;
  }

  function makeWideCard(story, edDate, idx, type) {
    const card = document.createElement('a');
    card.className = 'article-card-wide';
    card.href = articleUrl(edDate, idx, type);
    card.dataset.tag = story.tag || '';

    const img = document.createElement('div');
    img.className = 'card-img';
    img.innerHTML = '<span>◆</span>';

    const body = document.createElement('div');
    body.className = 'card-body';
    const tag  = document.createElement('div');  tag.className  = 'card-tag';      tag.textContent = story.tag || '';
    const head = document.createElement('div');  head.className = 'card-headline'; head.textContent = story.headline || '';
    const desc = document.createElement('p');    desc.className = 'card-desc';     desc.textContent = story.desc || '';
    body.append(tag, head, desc);

    card.append(img, body);
    return card;
  }

  function renderWeek(edition) {
    const news  = edition.news || [];
    const edDate = edition.date;
    const type  = edition.type || 'weekly';
    const weekNum = getWeekNumber(new Date(edDate));

    const section = document.createElement('div');
    section.className = 'week-section';

    const content = document.createElement('div');
    content.className = 'week-content';

    // Row of 3 (stories 0–2)
    const stories03 = [0,1,2].filter(i => news[i]);
    if (stories03.length) {
      const row = document.createElement('div');
      row.className = 'row-three';
      stories03.forEach(i => row.appendChild(makeCard(news[i], edDate, i, type)));
      content.appendChild(row);
    }

    // Row of 2 (stories 3–4) with image placeholder
    const stories45 = [3,4].filter(i => news[i]);
    if (stories45.length) {
      const row = document.createElement('div');
      row.className = 'row-two';
      stories45.forEach(i => row.appendChild(makeWideCard(news[i], edDate, i, type)));
      content.appendChild(row);
    }

    section.appendChild(content);

    // Bracket ] with label outside to the right
    const bracket = document.createElement('div');
    bracket.className = 'week-bracket';
    const shape = document.createElement('div');
    shape.className = 'bracket-shape';
    const label = document.createElement('a');
    label.className = 'week-label';
    label.textContent = `Week ${weekNum}`;
    label.href = `WeeklyPage.html?date=${edDate}${type === 'monthly' ? '&type=monthly' : ''}`;
    bracket.append(shape, label);
    section.appendChild(bracket);

    return section;
  }

  let activeFilter = null;
  const EXCLUDED_TAGS = new Set(['Models', 'Research', 'Industry', 'Policy', 'Tools']);

  function shortTag(tag) {
    return tag.replace(/^AI\s+in\s+/i, '').replace(/^AI\s*\+\s*/i, '').trim();
  }

  function applyFilter(tag) {
    activeFilter = activeFilter === tag ? null : tag;
    document.querySelectorAll('.article-card, .article-card-wide').forEach(el => {
      if (!activeFilter) { el.classList.remove('card-dim', 'card-active'); }
      else if (el.dataset.tag === activeFilter) { el.classList.remove('card-dim'); el.classList.add('card-active'); }
      else { el.classList.remove('card-active'); el.classList.add('card-dim'); }
    });
    document.querySelectorAll('.filter-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tag === activeFilter);
    });
  }

  document.getElementById('filter-toggle').addEventListener('click', () => {
    const dd = document.getElementById('filter-dropdown');
    const arrow = document.getElementById('filter-arrow');
    const open = dd.classList.toggle('open');
    arrow.textContent = open ? '▴' : '▾';
  });

  let allEditionsCache = null;

  function loadAndRender() {
    const monthName = MONTH_NAMES[viewMonth];
    const container = document.getElementById('weeks-container');
    container.innerHTML = '<div class="empty-state">Loading…</div>';

    const doRender = (all) => {
      const prefix = `${viewYear}-${String(viewMonth + 1).padStart(2,'0')}`;
      const editions = all
        .filter(e => e.date && e.date.startsWith(prefix) && e.type !== 'monthly')
        .sort((a, b) => a.date.localeCompare(b.date));

      container.innerHTML = '';

      // Rebuild filter dropdown
      const dd = document.getElementById('filter-dropdown');
      dd.innerHTML = '';
      activeFilter = null;
      const tagSet = new Set();
      editions.forEach(e => (e.news || []).forEach(s => { if (s.tag) tagSet.add(s.tag); }));
      const tags = [...tagSet].filter(t => !EXCLUDED_TAGS.has(t));
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-item'; btn.dataset.tag = tag;
        btn.textContent = shortTag(tag);
        btn.addEventListener('click', () => applyFilter(tag));
        dd.appendChild(btn);
      });
      if (tags.length) {
        const clr = document.createElement('button');
        clr.className = 'filter-clear'; clr.textContent = 'Clear filter';
        clr.addEventListener('click', () => { applyFilter(null); activeFilter = null; document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); document.querySelectorAll('.article-card, .article-card-wide').forEach(el => el.classList.remove('card-dim','card-active')); });
        dd.appendChild(clr);
      }

      if (!editions.length) {
        container.innerHTML = `<div class="empty-state">No editions found for ${monthName} ${viewYear}</div>`;
        return;
      }
      editions.forEach(e => container.appendChild(renderWeek(e)));
    };

    if (allEditionsCache) { doRender(allEditionsCache); return; }
    fetch('./editions.json')
      .then(r => r.json())
      .then(all => { allEditionsCache = all; doRender(all); })
      .catch(() => { container.innerHTML = `<div class="empty-state">Could not load editions</div>`; });
  }

  updateView();
</script>

</body>
</html>
